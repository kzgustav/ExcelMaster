const $=s=>document.querySelector(s);let idx=0,filter='all',query='';const LS='excelmaster-progress-v1';let progress=JSON.parse(localStorage.getItem(LS)||'{}');
function norm(s){return String(s||'').toUpperCase().replace(/\s+/g,'').replace(/，/g,',')}function addr(a){let m=a.match(/([A-Z]+)(\d+)/);let col=[...m[1]].reduce((n,ch)=>n*26+ch.charCodeAt(0)-64,0)-1;return{row:+m[2]-1,col}}
function current(){return C[idx]}function tableFor(c){let data=TABLES[c.table].map(r=>r.slice());let rc=addr(c.target);while(data.length<=rc.row)data.push([]);while(data[0].length<=rc.col)data.forEach(r=>{while(r.length<=rc.col)r.push('')});return data}
function renderList(){let list=C.filter(c=>(filter==='all'||c.lv===filter)&&[c.t,c.cat,c.lv,c.req.join(' ')].join(' ').toLowerCase().includes(query.toLowerCase()));$('#list').innerHTML=list.map(c=>{let i=C.indexOf(c),p=progress[c.id]||{};return `<button class="item ${i===idx?'active':''}" data-i="${i}"><span class="badge">${p.best?'完了':c.lv}</span><b>${c.t}</b><small>${c.cat}｜${c.req.join('・')}</small></button>`}).join('');document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{idx=+b.dataset.i;render()})}
function render(){let c=current(),p=progress[c.id]||{};$('#meta').textContent=`${c.lv}・${c.cat}`;$('#title').textContent=c.t;$('#scenario').textContent='サンプル表をもとに、指定されたセルへ関数式を入力します。';$('#mission').textContent=c.m;$('#target').textContent=c.target;$('#formula').value=p.last||'';$('#feedback').className='feedbackBox warn';$('#feedback').textContent='まだ採点していません。';$('#tags').innerHTML=c.req.map(x=>`<span class="tag">${x}</span>`).join('');$('#hints').innerHTML=c.h.map(x=>`<li>${x}</li>`).join('');$('#glossary').innerHTML=c.req.map(x=>`<li><b>${x}</b>：${F[x]||'関数の説明を確認しましょう。'}</li>`).join('');renderGrid();renderList();stats()}
function renderGrid(){let c=current(),data=tableFor(c),rc=addr(c.target),letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';let rows=Math.max(data.length,12),cols=Math.max(data[0].length,10);let html='<tr><th></th>'+Array.from({length:cols},(_,i)=>`<th>${letters[i]}</th>`).join('')+'</tr>';for(let r=0;r<rows;r++){html+=`<tr><th>${r+1}</th>`;for(let col=0;col<cols;col++){let v=(data[r]&&data[r][col])??'',cls=r===0&&v?'header':'text';if(r===rc.row&&col===rc.col){v=$('#formula').value||'';cls+=' answer'}html+=`<td class="${cls}">${escape(v)}</td>`}html+='</tr>'}$('#grid').innerHTML=html}
function escape(v){return String(v).replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}
function valEq(a,b){if(a&&typeof a==='object'&&a.value!==undefined)a=a.value;if(a instanceof Date)a=a.toISOString().slice(0,10);if(typeof a==='number'&&typeof b==='number')return Math.abs(a-b)<1e-6;return String(a).slice(0,10)===String(b).slice(0,10)||String(a)===String(b)}
function evalHF(c,formula){if(!window.HyperFormula)throw Error('no engine');let data=tableFor(c);let rc=addr(c.target);data[rc.row][rc.col]=formula;let hf=HyperFormula.buildFromArray(data,{licenseKey:'gpl-v3',useColumnIndex:true});return hf.getCellValue({sheet:0,row:rc.row,col:rc.col})}
function check(){let c=current(),f=$('#formula').value.trim();let reqOk=c.req.every(fn=>norm(f).includes(fn+'('));let exact=norm(f)===norm(c.a);let value,evalOk=false,err='';try{value=evalHF(c,f);evalOk=valEq(value,c.exp)}catch(e){err=e.message}let ok=(reqOk&&evalOk)||exact;let score=ok?1:(reqOk||exact?.6:0);progress[c.id]={best:Math.max(progress[c.id]?.best||0,score),last:f};localStorage.setItem(LS,JSON.stringify(progress));let cls=ok?'ok':reqOk?'warn':'ng';$('#feedback').className='feedbackBox '+cls;$('#feedback').innerHTML=ok?`正解です。<br>結果：<code>${escape(value??c.exp)}</code>`:`${reqOk?'関数の選び方は近いです。':'指定関数が不足しているかもしれません。'}<br>評価結果：<code>${escape(value??'計算不可')}</code><br>${err?`補足：${escape(err)}<br>`:''}期待値：<code>${escape(c.exp)}</code>`;renderGrid();renderList();stats()}
function stats(){let vals=C.map(c=>progress[c.id]).filter(Boolean);$('#done').textContent=vals.filter(p=>p.best>=1).length;$('#tried').textContent=vals.length;$('#best').textContent=(vals.length?Math.round(vals.reduce((s,p)=>s+(p.best||0),0)/vals.length*100):0)+'%'}
$('#check').onclick=check;$('#answer').onclick=()=>{$('#formula').value=current().a;renderGrid()};$('#reset').onclick=()=>{$('#formula').value='';renderGrid()};$('#prev').onclick=()=>{idx=(idx+C.length-1)%C.length;render()};$('#next').onclick=()=>{idx=(idx+1)%C.length;render()};$('#random').onclick=()=>{idx=Math.floor(Math.random()*C.length);render()};$('#search').oninput=e=>{query=e.target.value;renderList()};document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;renderList()});$('#formula').addEventListener('input',renderGrid);render();
