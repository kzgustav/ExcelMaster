<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ExcelMaster｜中級〜上級 関数学習サイト</title>
  <meta name="description" content="Excel中級〜上級関数を、問題・疑似Excelプレイグラウンド・答え合わせで反復学習できるWebサイト。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">ExcelMaster</p>
        <h1>Excel関数 中級〜上級<br><span>反復トレーニングサイト</span></h1>
        <p class="lead">問題を選ぶ → シートに式を書く → 答え合わせ。ブラウザだけで、埋め込みExcelっぽく何度でも練習できます。</p>
      </div>
      <div class="hero-card" aria-label="進捗サマリー">
        <div class="stat"><strong id="statCompleted">0</strong><span>完了</span></div>
        <div class="stat"><strong id="statAttempted">0</strong><span>挑戦済み</span></div>
        <div class="stat"><strong id="statBest">0%</strong><span>平均ベスト</span></div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="panel compact">
          <label class="search-label" for="searchBox">問題を探す</label>
          <input id="searchBox" class="search" type="search" placeholder="XLOOKUP / FILTER / 集計 など" />
          <div class="filter-row" role="group" aria-label="難易度フィルター">
            <button class="chip active" data-filter="all">全部</button>
            <button class="chip" data-filter="中級">中級</button>
            <button class="chip" data-filter="上級">上級</button>
            <button class="chip" data-filter="365">365</button>
          </div>
          <button id="randomBtn" class="ghost full">ランダム出題</button>
        </div>
        <nav id="challengeList" class="challenge-list" aria-label="問題一覧"></nav>
      </aside>

      <main class="main">
        <section class="panel challenge-panel">
          <div class="challenge-head">
            <div>
              <p id="challengeMeta" class="meta"></p>
              <h2 id="challengeTitle"></h2>
            </div>
            <div class="nav-buttons">
              <button id="prevBtn" class="ghost">前へ</button>
              <button id="nextBtn" class="ghost">次へ</button>
            </div>
          </div>
          <p id="challengeScenario" class="scenario"></p>
          <div id="functionTags" class="tags"></div>
          <div class="task-box">
            <strong>今回のミッション</strong>
            <p id="challengeInstruction"></p>
            <details>
              <summary>ヒントを見る</summary>
              <div id="challengeHints"></div>
            </details>
          </div>
        </section>

        <section class="panel sheet-panel">
          <div class="formula-row">
            <div id="activeAddress" class="address-box">A1</div>
            <input id="formulaBar" class="formula-bar" spellcheck="false" autocomplete="off" />
            <button id="checkBtn" class="primary">答え合わせ</button>
            <button id="resetBtn" class="ghost">リセット</button>
            <button id="answerBtn" class="ghost">答えを見る</button>
          </div>
          <p class="sheet-help">黄色セルが解答セルです。セルをクリックして、数式バーまたはセルに直接入力できます。</p>
          <div class="grid-wrap">
            <table id="grid" class="grid" aria-label="疑似Excelシート"></table>
          </div>
        </section>

        <section class="two-col">
          <div class="panel feedback-panel">
            <h3>採点結果</h3>
            <div id="feedback" class="feedback empty">まだ採点していません。</div>
          </div>
          <div class="panel glossary-panel">
            <h3>関数メモ</h3>
            <div id="glossary" class="glossary"></div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
